services:
  app:
    build: .
    environment:
      PORT: 8000
      FLASK_ENV: production
      FLASK_APP: application:application
      DB_MIGRATION_RETRIES: 12
      DB_MIGRATION_RETRY_DELAY: 5
      # Local fallback if you run with --profile local
      DATABASE_URL: postgresql+psycopg://user_blacklist:password123@db:5432/blacklist_db
    ports:
      - "80:8000"

  db:
    profiles: ["local"]
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user_blacklist
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: blacklist_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: